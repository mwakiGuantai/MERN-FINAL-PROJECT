<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDMAXTUBE</title>
    <style>
        /* CSS RESET & GLOBAL STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #141414; /* Deep dark background */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* NAVIGATION BAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-links li a {
            color: #e5e5e5;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav-links li a:hover, .nav-links li a.active {
            color: #ffffff;
            font-weight: bold;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 18px;
            cursor: pointer;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            height: 80vh;
            display: flex;
            align-items: center;
            padding: 0 4%;
            /* Placeholder for the Wildebeest background */
            background-image: url('https://images.unsplash.com/photo-1516426122078-c23e76319801?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        /* Gradient overlays to make text readable */
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0) 100%),
                        linear-gradient(to top, #141414 0%, rgba(20,20,20,0) 20%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin-top: 50px;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .hero-description {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* BUTTONS */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .btn-play {
            background-color: white;
            color: black;
        }

        .btn-play:hover {
            background-color: rgba(255, 255, 255, 0.75);
        }

        .btn-secondary {
            background-color: rgba(109, 109, 110, 0.7);
            color: white;
        }

        .btn-secondary:hover {
            background-color: rgba(109, 109, 110, 0.4);
        }

        .icon {
            margin-right: 8px;
            font-size: 1.2rem;
        }

        /* TRENDING SECTION (CONTENT GRID) */
        .content-section {
            padding: 20px 4%;
            position: relative;
            z-index: 5;
            margin-top: -100px; /* Pulls the grid up over the bottom of the hero gradient */
        }

        .section-title {
            font-size: 1.4rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .poster-grid {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        /* Hide scrollbar for clean look */
        .poster-grid::-webkit-scrollbar { display: none; }
        
        .poster-card {
            min-width: 200px;
            height: 300px;
            border-radius: 5px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .poster-card:hover {
            transform: scale(1.05); /* Slight zoom on hover */
        }

    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="logo">EDMAXTUBE</div>
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">Series</a></li>
                <li><a href="#">My List</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <span>🔍</span> <span>🔔</span> <span>👤</span> </div>
    </nav>

    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">Natural music Untamed</h1>
            <p class="hero-description">Journey through breathtaking melodies and witness the raw power of the natural music world.</p>
            <div class="btn-group">
                <button class="btn btn-play"><span class="icon">▶</span> Play Now</button>
                <button class="btn btn-secondary"><span class="icon">+</span> My List</button>
                <button class="btn btn-secondary"><span class="icon">ⓘ</span> More Info</button>
            </div>
        </div>
    </header>

    <section class="content-section">
        <h2 class="section-title">Trending Now</h2>
        <div class="poster-grid">
            <div class="poster-card" style="background-image: url('https://images.unsplash.com/photo-1549887552-cb1071d3e5ca?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80');"></div>
            <div class="poster-card" style="background-image: url('https://images.unsplash.com/photo-1600100414902-e2d93e15b3c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80');"></div>
            <div class="poster-card" style="background-image: url('https://images.unsplash.com/photo-1440407876336-62333a6f010c?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80');"></div>
            <div class="poster-card" style="background-image: url('https://images.unsplash.com/photo-1478720568477-152d9b164e26?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80');"></div>
             <div class="poster-card" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80');"></div>
        </div>
    </section>

</body>
</html>
